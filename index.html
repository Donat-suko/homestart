<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeStart – Le supermarché du monde</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #F0F2F5;
      min-height: 100vh;
      color: #1C1C1C;
    }

    header {
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; white-space: nowrap; }
    .logo span { color: #E8603C; }
    .header-search { flex: 1; max-width: 480px; position: relative; }
    .header-search input {
      width: 100%;
      padding: 9px 16px 9px 38px;
      border-radius: 24px;
      border: 1.5px solid #E5E7EB;
      font-size: 14px;
      background: #F9FAFB;
      outline: none;
      transition: border-color .2s;
    }
    .header-search input:focus { border-color: #E8603C; background: #fff; }
    .header-search .icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: #9CA3AF;
    }
    .header-tag { font-size: 12px; color: #9CA3AF; white-space: nowrap; display: none; }
    @media (min-width: 600px) { .header-tag { display: block; } }

    .cat-bar { background: #fff; border-top: 1px solid #F0F2F5; border-bottom: 1px solid #F0F2F5; }
    .cat-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .cat-inner::-webkit-scrollbar { display: none; }
    .cat-btn {
      white-space: nowrap;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #E5E7EB;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #374151;
      transition: all .15s;
    }
    .cat-btn:hover { border-color: #E8603C; color: #E8603C; }
    .cat-btn.active { background: #E8603C; color: #fff; border-color: #E8603C; }

    main { max-width: 1100px; margin: 0 auto; padding: 18px 12px 40px; }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .product-count { font-size: 13px; color: #6B7280; }
    .sort-bar { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; }
    .sort-bar::-webkit-scrollbar { display: none; }
    .sort-btn {
      white-space: nowrap;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid #E5E7EB;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      color: #374151;
      transition: all .15s;
    }
    .sort-btn:hover, .sort-btn.active { background: #1F2937; color: #fff; border-color: #1F2937; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 520px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 800px) { .grid { grid-template-columns: repeat(4, 1fr); } }

    .card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
      position: relative;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s, transform .2s;
    }
    .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.12); transform: translateY(-2px); }

    .card-img-wrap { position: relative; }
    .card img { width: 100%; height: 160px; object-fit: cover; display: block; }

    .card-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: #E8603C;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 10px;
    }
    .save-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,0.92);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      transition: transform .15s;
    }
    .save-btn:hover { transform: scale(1.15); }

    .card-body { padding: 10px 11px 14px; flex: 1; display: flex; flex-direction: column; }

    .store-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 8px;
      color: #fff;
      margin-bottom: 6px;
    }
    .card-name {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 6px;
      color: #1C1C1C;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .stars { color: #FBBF24; font-size: 12px; }
    .stars span { color: #9CA3AF; font-size: 11px; margin-left: 3px; }
    .rating-row { margin-bottom: 8px; }

    .card-price { font-size: 22px; font-weight: 900; color: #E8603C; margin-bottom: 10px; }

    .buy-btn {
      display: block;
      background: #E8603C;
      color: #fff;
      text-align: center;
      padding: 9px 0;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      transition: background .2s;
    }
    .buy-btn:hover { background: #cf4f2d; }

    .saves-count { font-size: 11px; color: #9CA3AF; text-align: center; margin-top: 7px; }

    .no-results {
      text-align: center;
      color: #9CA3AF;
      font-size: 15px;
      padding: 60px 20px;
      grid-column: 1 / -1;
    }

    footer {
      background: #1F2937;
      color: #9CA3AF;
      text-align: center;
      padding: 24px 16px;
      font-size: 12px;
      line-height: 1.8;
    }
    footer strong { color: #fff; font-size: 16px; font-weight: 900; }
    footer .accent { color: #E8603C; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Home<span>Start</span></div>
    <div class="header-search">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Rechercher un produit, un magasin..." oninput="filterProducts()" />
    </div>
    <div class="header-tag">🌍 Le supermarché du monde</div>
  </div>
</header>

<div class="cat-bar">
  <div class="cat-inner" id="catBar"></div>
</div>

<main>
  <div class="top-bar">
    <div class="product-count" id="productCount"></div>
    <div class="sort-bar">
      <button class="sort-btn active" onclick="sortProducts('default', this)">Pertinence</button>
      <button class="sort-btn" onclick="sortProducts('priceAsc', this)">Prix ↑</button>
      <button class="sort-btn" onclick="sortProducts('priceDesc', this)">Prix ↓</button>
      <button class="sort-btn" onclick="sortProducts('rating', this)">Meilleures notes</button>
      <button class="sort-btn" onclick="sortProducts('saves', this)">Plus sauvegardés</button>
    </div>
  </div>
  <div class="grid" id="productGrid"></div>
</main>

<footer>
  <strong>Home<span class="accent">Start</span></strong><br/>
  Le supermarché du monde · Liens directs vers les meilleurs produits<br/>
  &copy; 2025 HomeStart · Fait avec &#10084;&#65039; pour le monde entier
</footer>

<script>
const PRODUCTS = [
  { name:"Aspirateur robot Xiaomi S10+", category:"Électronique", price:89.99, currency:"€", store:"AliExpress", rating:4.6, reviews:2341, saves:892, badge:"⚡ Vente flash", img:"https://picsum.photos/seed/robotvac/400/400", link:"https://aliexpress.com" },
  { name:"Chaise ergonomique maille respirante", category:"Bureau", price:129.00, currency:"€", store:"Amazon", rating:4.4, reviews:1876, saves:1204, badge:"🏆 Best-seller", img:"https://picsum.photos/seed/ergchair/400/400", link:"https://amazon.com" },
  { name:"Set couteaux 6 pièces acier inox", category:"Cuisine", price:22.50, currency:"€", store:"Temu", rating:4.2, reviews:5632, saves:654, badge:"🔥 Populaire", img:"https://picsum.photos/seed/knifeset/400/400", link:"https://temu.com" },
  { name:"Rideau occultant thermique 140x260", category:"Chambre", price:15.99, currency:"€", store:"Amazon", rating:4.5, reviews:3210, saves:432, badge:null, img:"https://picsum.photos/seed/curtain/400/400", link:"https://amazon.com" },
  { name:"Montre connectée sport GPS", category:"Sport", price:34.99, currency:"€", store:"AliExpress", rating:4.3, reviews:8901, saves:2103, badge:"⚡ Vente flash", img:"https://picsum.photos/seed/smartwatch/400/400", link:"https://aliexpress.com" },
  { name:"Plantes succulentes set de 6", category:"Jardin", price:12.90, currency:"€", store:"Alibaba", rating:4.7, reviews:743, saves:321, badge:"🌿 Éco", img:"https://picsum.photos/seed/succulent/400/400", link:"https://alibaba.com" },
  { name:"Cafetière expresso 15 bars", category:"Cuisine", price:49.99, currency:"€", store:"Amazon", rating:4.5, reviews:4521, saves:1876, badge:"🏆 Best-seller", img:"https://picsum.photos/seed/espresso/400/400", link:"https://amazon.com" },
  { name:"Lampe de bureau LED flexible", category:"Bureau", price:16.00, currency:"€", store:"Temu", rating:4.1, reviews:2198, saves:543, badge:null, img:"https://picsum.photos/seed/desklamp/400/400", link:"https://temu.com" },
  { name:"Miroir rond doré 60cm", category:"Salon", price:29.95, currency:"€", store:"IKEA", rating:4.8, reviews:6120, saves:3201, badge:"🔥 Populaire", img:"https://picsum.photos/seed/goldmirror/400/400", link:"https://ikea.com" },
  { name:"Organisateur de bureau en bambou", category:"Bureau", price:19.00, currency:"$", store:"AliExpress", rating:4.3, reviews:987, saves:412, badge:null, img:"https://picsum.photos/seed/deskorg/400/400", link:"https://aliexpress.com" },
  { name:"Tapis de salon géométrique 160x230", category:"Salon", price:54.00, currency:"€", store:"Amazon", rating:4.4, reviews:2340, saves:876, badge:null, img:"https://picsum.photos/seed/geometricrug/400/400", link:"https://amazon.com" },
  { name:"Cafetière à piston Bodum 1L", category:"Cuisine", price:24.99, currency:"€", store:"Amazon", rating:4.6, reviews:8763, saves:2341, badge:"🏆 Best-seller", img:"https://picsum.photos/seed/coffeepot/400/400", link:"https://amazon.com" },
];

const STORE_COLORS = {
  "Amazon":"#FF9900", "Temu":"#FF6B35", "AliExpress":"#E63946",
  "IKEA":"#0058A3", "Alibaba":"#FF6A00", "Jumia":"#3BB77E",
  "Walmart":"#007DC6", "Shein":"#000000", "eBay":"#86B817"
};

let activeCategory = "Tout";
let activeSort = "default";
let saved = new Set();

function init() {
  buildCategories();
  renderProducts();
}

function buildCategories() {
  const cats = ["Tout", ...new Set(PRODUCTS.map(p => p.category))];
  document.getElementById("catBar").innerHTML = cats.map(c =>
    `<button class="cat-btn ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`
  ).join("");
}

function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.toggle("active", b.textContent === cat));
  renderProducts();
}

function filterProducts() { renderProducts(); }

function sortProducts(type, btn) {
  activeSort = type;
  document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderProducts();
}

function toggleSave(idx) {
  saved.has(idx) ? saved.delete(idx) : saved.add(idx);
  const btn = document.querySelector(`.save-btn[data-idx="${idx}"]`);
  if (btn) btn.textContent = saved.has(idx) ? "🔖" : "📑";
}

function renderProducts() {
  const query = document.getElementById("searchInput").value.toLowerCase();

  let list = PRODUCTS.map((p, i) => ({ ...p, idx: i })).filter(p => {
    const matchCat = activeCategory === "Tout" || p.category === activeCategory;
    const matchSearch = p.name.toLowerCase().includes(query) || p.store.toLowerCase().includes(query) || p.category.toLowerCase().includes(query);
    return matchCat && matchSearch;
  });

  if (activeSort === "priceAsc")  list.sort((a, b) => a.price - b.price);
  if (activeSort === "priceDesc") list.sort((a, b) => b.price - a.price);
  if (activeSort === "rating")    list.sort((a, b) => b.rating - a.rating);
  if (activeSort === "saves")     list.sort((a, b) => b.saves - a.saves);

  document.getElementById("productCount").textContent =
    `${list.length} produit${list.length !== 1 ? "s" : ""} · Liens directs vérifiés`;

  const grid = document.getElementById("productGrid");

  if (list.length === 0) {
    grid.innerHTML = `<div class="no-results">😕 Aucun produit trouvé.<br/>Essayez un autre mot-clé ou une autre catégorie.</div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const storeColor = STORE_COLORS[p.store] || "#6B7280";
    const stars = "★".repeat(Math.floor(p.rating)) + "☆".repeat(5 - Math.floor(p.rating));
    const isSaved = saved.has(p.idx);
    return `
      <div class="card">
        <div class="card-img-wrap">
          <img src="${p.img}" alt="${p.name}" loading="lazy"
            onerror="this.src='https://picsum.photos/seed/fallback${p.idx}/400/400'" />
          ${p.badge ? `<div class="card-badge">${p.badge}</div>` : ""}
          <button class="save-btn" data-idx="${p.idx}" onclick="toggleSave(${p.idx})">${isSaved ? "🔖" : "📑"}</button>
        </div>
        <div class="card-body">
          <div class="store-badge" style="background:${storeColor}">${p.store}</div>
          <div class="card-name">${p.name}</div>
          <div class="rating-row">
            <span class="stars">${stars}<span>(${p.reviews.toLocaleString()})</span></span>
          </div>
          <div class="card-price">${p.currency}${p.price.toFixed(2)}</div>
          <a href="${p.link}" target="_blank" rel="noopener noreferrer" class="buy-btn">Voir le produit →</a>
          <div class="saves-count">🔖 ${p.saves.toLocaleString()} sauvegardes</div>
        </div>
      </div>`;
  }).join("");
}

init();
</script>
</body>
</html>
